<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Scope Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Market Scope Dashboard</h1>
    </header>
    <main>
        <section class="top-indices">
            <h2>Top Indices</h2>
            <div class="grid">
                <div class="index">S&P 500</div>
                <div class="index">Dow Jones</div>
                <div class="index">NASDAQ</div>
                <div class="index">FTSE 100</div>
                <div class="index">DAX</div>
                <div class="index">Nikkei 225</div>
                <div class="index">VIX Fear Gauge</div>
            </div>
        </section>
        <section class="watchlist">
            <h2>Watchlist</h2>
            <ul>
                <li>AAPL</li>
                <li>GOOGL</li>
                <li>MSFT</li>
                <li>TSLA</li>
                <li>AMZN</li>
                <li>Dow Jones</li>
                <li>NASDAQ</li>
                <li>VIX Fear Gauge</li>
            </ul>
        </section>
        <!-- Other dashboard sections remain unchanged -->
    </main>
</body>
</html>
